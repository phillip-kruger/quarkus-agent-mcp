name: Release

on:
  release:
    types: [ published ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: ossrh
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set version from release tag
        run: |
          VERSION=${{ github.event.release.tag_name }}
          VERSION=${VERSION#v}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Invalid version format: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          ./mvnw versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Deploy to Maven Central
        run: ./mvnw deploy -Prelease -DskipTests
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload uber-jar to release
        run: gh release upload ${{ github.event.release.tag_name }} target/quarkus-agent-mcp-${{ env.VERSION }}-runner.jar --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update version in JBang catalog and plugin manifest
        run: |
          cat > jbang-catalog.json << CATALOG_EOF
          {
            "aliases": {
              "quarkus-agent-mcp": {
                "script-ref": "io.quarkus:quarkus-agent-mcp:${VERSION}:runner",
                "description": "Standalone MCP server for AI coding agents to manage Quarkus applications",
                "java-version": "21+"
              }
            }
          }
          CATALOG_EOF
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit updated JBang catalog and plugin manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update versions for v${{ env.VERSION }}"
          file_pattern: jbang-catalog.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          branch: main
